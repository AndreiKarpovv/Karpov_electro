version: '3.8'

services:
  worker:
    build:
      context: ./smart-grid
      dockerfile: Dockerfile
    container_name: smart-grid-worker
    restart: unless-stopped
    ports:
      - "9100:9100"
    # Добавляем метки, по которым центральный Prometheus ищет цели для сбора метрик
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9100"
      - "prometheus.job=smart-grid-automation"
    networks:
      default:
      global-coolify:
        # Даём чёткое имя хоста внутри общей сети coolify
        aliases:
          - smart-grid-worker
          - smart-grid-automation

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-grid-ui
    restart: unless-stopped
    networks:
      - default
      - global-coolify

# Объявляем внешнюю сеть, через которую доступен loki-master
networks:
  global-coolify:
    external: true
    name: coolify