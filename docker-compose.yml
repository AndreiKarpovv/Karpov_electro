version: '3.8'

services:
  worker:
    build:
      context: ./smart-grid
      dockerfile: Dockerfile
    container_name: smart-grid-worker
    restart: unless-stopped
    networks:
      - default
      - global-coolify

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-grid-ui
    restart: unless-stopped
    networks:
      - default
      - global-coolify

# Объявляем внешнюю сеть, через которую доступен loki-master
networks:
  global-coolify:
    external: true
    name: coolify