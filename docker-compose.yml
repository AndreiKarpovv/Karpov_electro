version: '3.8'

services:
  worker:
    build:
      context: ./smart-grid
      dockerfile: Dockerfile
    container_name: smart-grid-worker
    command: >
      bun -e "
      fetch('http://pocketbase:8080/api/initial-admin-create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: 'test@gmail.com',
          password: 'testtest',
          passwordConfirm: 'testtest'
        })
      })
      .then(r => r.json().then(data => console.log('✅ ОТВЕТ БАЗЫ:', data)))
      .catch(e => console.log('❌ ОШИБКА ЗАПРОСА:', e.message))
      "
    restart: unless-stopped
    ports:
      - "9100:9100"
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9100"
    networks:
      - default
      - global-coolify

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smart-grid-ui
    restart: unless-stopped
    networks:
      - default
      - global-coolify

networks:
  global-coolify:
    external: true
    name: coolify